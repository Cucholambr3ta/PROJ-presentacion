<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Central Cycle -->
  <circle cx="400" cy="200" r="140" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="8 8"/>
  
  <rect x="330" y="160" width="140" height="80" rx="40" fill="#1F3864"/>
  <text x="400" y="195" text-anchor="middle" fill="white" font-family="Fraunces, serif" font-size="16" font-weight="bold">SPRINT</text>
  <text x="400" y="215" text-anchor="middle" fill="#D6E4F7" font-family="DM Sans, sans-serif" font-size="10">2 SEMANAS</text>

  <!-- Step 1: Backlog (Top) -->
  <rect x="320" y="20" width="160" height="50" rx="8" fill="#EBF2FC" stroke="#1F3864" stroke-width="1.5"/>
  <text x="400" y="45" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">Product Backlog</text>
  <text x="400" y="60" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="8">Priorización de Valor</text>

  <!-- Step 2: Planning (Top Right) -->
  <rect x="560" y="80" width="160" height="50" rx="8" fill="#EBF2FC" stroke="#1F3864" stroke-width="1.5"/>
  <text x="640" y="105" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">Sprint Planning</text>
  <text x="640" y="120" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="8">Estimación y Compromiso</text>

  <!-- Step 3: Development (Bottom Right) -->
  <rect x="580" y="240" width="160" height="50" rx="8" fill="#D6E4F7" stroke="#2E5FA3" stroke-width="1.5"/>
  <text x="660" y="265" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">Desarrollo Ágil</text>
  <text x="660" y="280" text-anchor="middle" fill="#1F3864" font-family="DM Sans, sans-serif" font-size="8">Pair Programming &amp; Daily</text>

  <!-- Step 4: QA (Bottom) -->
  <rect x="320" y="330" width="160" height="50" rx="8" fill="#E2F0E8" stroke="#1F7A45" stroke-width="1.5"/>
  <text x="400" y="355" text-anchor="middle" fill="#003300" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">QA &amp; Code Review</text>
  <text x="400" y="370" text-anchor="middle" fill="#003300" font-family="DM Sans, sans-serif" font-size="8">TDD &amp; Automatización</text>

  <!-- Step 5: Demo (Bottom Left) -->
  <rect x="60" y="240" width="160" height="50" rx="8" fill="#1F7A45" stroke="#003300" stroke-width="1.5"/>
  <text x="140" y="265" text-anchor="middle" fill="white" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">Demo &amp; Deploy</text>
  <text x="140" y="280" text-anchor="middle" fill="#E2F0E8" font-family="DM Sans, sans-serif" font-size="8">Entrega Continua</text>

  <!-- Step 6: Feedback (Top Left) -->
  <rect x="80" y="80" width="160" height="50" rx="8" fill="#FAE8CC" stroke="#B07040" stroke-width="1.5"/>
  <text x="160" y="105" text-anchor="middle" fill="#2C1A0E" font-family="DM Sans, sans-serif" font-size="11" font-weight="bold">Feedback Ciclo</text>
  <text x="160" y="120" text-anchor="middle" fill="#7A5035" font-family="DM Sans, sans-serif" font-size="8">Retrospectiva &amp; Ajustes</text>

  <!-- Arrows (Simple Path) -->
  <path d="M480 45 Q560 45 600 80" stroke="#1F3864" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M640 130 Q660 185 660 240" stroke="#2E5FA3" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M580 290 Q480 355 400 355" stroke="#1F7A45" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M320 355 Q140 355 140 290" stroke="#1F7A45" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M140 240 Q140 185 160 130" stroke="#B07040" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M200 80 Q320 45 320 45" stroke="#1F3864" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1F3864" />
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1F7A45" />
    </marker>
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B07040" />
    </marker>
  </defs>

  <rect x="0" y="385" width="800" height="15" fill="#1F3864"/>
  <text x="400" y="396" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="600">MENU BYTES · METODOLOGÍA ÁGIL &amp; CALIDAD · 16 SEMANAS · 2026</text>
</svg>
